<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyAiPathways — Assignments</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* Sidebar — near black */
  --sb-bg: #0d0f14;
  --sb-surface: #151820;
  --sb-border: #1e2230;
  --sb-ink: #f2f4f8;
  --sb-ink2: #8e96aa;
  --sb-ink3: #464e62;
  --sb-accent: #4169e1;

  /* Content — almost white / light gray */
  --bg: #f4f5f7;
  --surface: #ffffff;
  --border: #e4e6eb;
  --border2: #cdd0d8;
  --ink: #111318;
  --ink2: #3a3e4a;
  --ink3: #7a7f8e;
  --ink4: #b0b5c2;
  --accent: #4169e1;
  --accent-l: #eef1fc;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--ink);
  font-size: 14px;
  line-height: 1.6;
  /* subtle grain */
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
}

.app { display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--sb-bg);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
  overflow-x: hidden;
}

/* Sidebar top accent line */
.sidebar::before {
  content: '';
  display: block;
  height: 2px;
  background: linear-gradient(90deg, var(--sb-accent) 0%, transparent 70%);
  flex-shrink: 0;
}

.sb-head {
  padding: 28px 24px 24px;
  border-bottom: 1px solid var(--sb-border);
}

.logo-eyebrow {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--sb-accent);
  margin-bottom: 8px;
}

.logo-title {
  font-family: 'Lora', serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--sb-ink);
  line-height: 1.2;
}

.sb-progress-wrap {
  padding: 16px 24px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sb-prog-track {
  flex: 1;
  height: 1px;
  background: var(--sb-border);
  position: relative;
  overflow: visible;
}

.sb-prog-fill {
  height: 1px;
  background: var(--sb-accent);
  transition: width .6s cubic-bezier(.4,0,.2,1);
  position: relative;
}

.sb-prog-fill::after {
  content: '';
  position: absolute;
  right: -3px;
  top: -3px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--sb-accent);
}

.sb-prog-pct {
  font-size: 11px;
  font-weight: 600;
  color: var(--sb-accent);
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* Nav */
.sb-nav { padding: 12px 12px; flex: 1; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 12px;
  border-radius: 6px;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  margin-bottom: 1px;
  transition: background .15s;
  position: relative;
}

.nav-item:hover { background: var(--sb-surface); }
.nav-item.active { background: var(--sb-surface); }
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 2px; height: 16px;
  background: var(--sb-accent);
  border-radius: 0 2px 2px 0;
}

.nav-num {
  font-family: 'Courier New', Courier, monospace;
  font-size: 16px;
  font-weight: 700;
  color: var(--sb-ink3);
  width: 30px;
  flex-shrink: 0;
  line-height: 1;
}
.nav-item.active .nav-num { color: var(--sb-accent); }
.nav-item.done .nav-num { color: var(--sb-ink2); }

.nav-name {
  font-family: 'Lora', serif;
  font-size: 12px;
  font-weight: 400;
  color: var(--sb-ink2);
  flex: 1;
  line-height: 1.3;
}
.nav-item.active .nav-name { color: var(--sb-ink); font-weight: 500; }

.nav-chk {
  width: 14px; height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px;
  color: transparent;
  border: 1px solid var(--sb-ink3);
  transition: all .2s;
}
.nav-item.done .nav-chk {
  background: var(--sb-accent);
  border-color: var(--sb-accent);
  color: var(--sb-bg);
}

/* ── MAIN ── */
.main { margin-left: 260px; flex: 1; min-width: 0; }
.content { padding: 56px 60px 120px; max-width: 1140px; }

.part-panel { display: none; }
.part-panel.active { display: block; animation: fadeUp .3s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── HERO ── */
.hero { margin-bottom: 40px; position: relative; }

.part-number {
  font-family: 'Lora', serif;
  font-size: 100px;
  font-weight: 600;
  line-height: 1;
  color: transparent;
  -webkit-text-stroke: 1px var(--border2);
  position: absolute;
  right: -10px;
  top: -20px;
  pointer-events: none;
  user-select: none;
  letter-spacing: -.04em;
}

.hero-eyebrow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
}

.hero h1 {
  font-family: 'Lora', serif;
  font-size: 34px;
  font-weight: 500;
  letter-spacing: -.02em;
  color: var(--ink);
  line-height: 1.15;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
}

.hero-tagline {
  font-family: 'Lora', serif;
  font-size: 14px;
  color: var(--ink3);
  font-weight: 400;
  position: relative;
  z-index: 1;
}

.hero-divider {
  margin-top: 28px;
  height: 1px;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity: .18;
}

/* ── META STRIP ── */
.meta-strip {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 32px;
}

.meta-cell {
  background: var(--surface);
  padding: 16px 20px;
}

.meta-key {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink4);
  margin-bottom: 5px;
}

.meta-val {
  font-size: 13px;
  color: var(--ink);
  line-height: 1.45;
}

/* ── BRIEFING ── */
.briefing { margin-bottom: 40px; }

.brief-why {
  font-size: 15px;
  color: var(--ink2);
  line-height: 1.75;
  margin-bottom: 28px;
  padding-left: 16px;
  border-left: 2px solid var(--accent);
}

.brief-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

.brief-col-title {
  font-family: 'Lora', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 12px;
}

.tip-list, .adv-list { display: flex; flex-direction: column; gap: 10px; }

.tip-item, .adv-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13px;
  line-height: 1.55;
}

.tip-item { color: var(--ink2); }
.adv-item { color: var(--ink3); }

.tip-n, .adv-n {
  font-size: 10px;
  font-weight: 700;
  color: var(--ink4);
  padding-top: 3px;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
  width: 14px;
}

.tip-item strong { color: var(--ink); font-weight: 600; }
.adv-item strong { color: var(--ink2); font-weight: 600; }

/* ── SECTION LABEL ── */
.sec-lbl {
  font-family: 'Lora', serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 16px;
  margin-top: 40px;
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.sec-lbl::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
  margin-bottom: 3px;
}

/* ── TASKS ── */
.task-list { display: flex; flex-direction: column; gap: 2px; }

.task-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  user-select: none;
}

.task-item:hover {
  border-color: var(--border2);
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
}

.task-item.done {
  background: var(--bg);
  border-color: var(--border);
  box-shadow: none;
}

.task-item.done .task-text {
  text-decoration: line-through;
  text-decoration-color: var(--ink4);
  color: var(--ink4);
}

.task-cb {
  width: 17px; height: 17px;
  border-radius: 4px;
  border: 1.5px solid var(--border2);
  flex-shrink: 0;
  margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  color: transparent;
  transition: all .15s;
  background: #fff;
}

.task-item.done .task-cb {
  background: var(--ink);
  border-color: var(--ink);
  color: #fff;
}

.task-text { font-size: 13px; color: var(--ink2); line-height: 1.5; }
.task-text strong { color: var(--ink); font-weight: 600; }

/* ── REFLECT ── */
.reflect-list { display: flex; flex-direction: column; gap: 20px; }

.reflect-q {
  font-family: 'Lora', serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.6;
  margin-bottom: 10px;
}

.reflect-in {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: var(--ink);
  resize: vertical;
  min-height: 80px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  line-height: 1.55;
}

.reflect-in::placeholder { color: var(--ink4); }
.reflect-in:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(65,105,225,.12);
}

/* ── SCORECARD ── */
.scorecard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px;
  margin-top: 4px;
}

.score-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 14px;
}

.score-cell { display: flex; flex-direction: column; gap: 3px; }

.score-key {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--ink3);
}

.score-sub { font-size: 11px; color: var(--ink4); }

.score-in {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 11px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  outline: none;
  transition: border-color .12s;
  width: 100%;
}
.score-in:focus { border-color: var(--accent); }

.score-notes {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: var(--ink);
  resize: vertical;
  min-height: 56px;
  outline: none;
  line-height: 1.5;
  transition: border-color .12s;
}
.score-notes::placeholder { color: var(--ink4); }
.score-notes:focus { border-color: var(--accent); }

/* ── COMPLETE BANNER ── */
.complete-banner {
  background: var(--sb-bg);
  border-radius: 10px;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 40px;
  opacity: 0;
  transform: translateY(8px);
  transition: all .4s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}

.complete-banner.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.cb-h {
  font-family: 'Lora', serif;
  font-size: 16px;
  font-weight: 500;
  color: var(--sb-ink);
  margin-bottom: 3px;
}

.cb-p { font-size: 12px; color: var(--sb-ink2); }

.next-btn {
  margin-left: auto;
  background: var(--sb-accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 10px 20px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity .15s, transform .15s;
  letter-spacing: .03em;
}
.next-btn:hover { opacity: .88; transform: translateX(2px); }

/* ── STATUS CHIP ── */
.chip {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
}
.chip-part { background: var(--accent-l); color: var(--accent); border: 1px solid rgba(65,105,225,.2); }
.chip-done { background: var(--sb-bg); color: var(--sb-accent); }
.chip-prog { background: var(--bg); color: var(--ink3); border: 1px solid var(--border); }

@media(max-width:760px){
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .content { padding: 28px 20px 60px; }
  .score-grid, .brief-cols, .meta-strip { grid-template-columns: 1fr; }
  .part-number { font-size: 64px; top: -10px; right: 0; }
}
</style>
</head>

<aside class="sidebar">
  <div class="sb-head">
    <div class="logo-eyebrow">MyAiPathways</div>
    <div class="logo-title">MyAiPathways</div>
  </div>

    <div class="sb-prog-track">
      <div class="sb-prog-fill" id="spFill" style="width:0%"></div>

  <nav class="sb-nav">
    <div id="navList"></div>

</aside>

<div class="main">
  <div class="content" id="mainContent"></div>
</div>
</div>

   why:"Data is the backbone of AI — and of good consulting. This part bridges \"AI can analyze data\" and actually doing it with real information. The 'take it further' stretch is where the real learning happens.",
   tips:[
     {b:"Start with a question:",t:"Don't upload data and ask \"what's interesting\" — come in with a hypothesis to test."},
     {b:"Take advantage of the tools out there!:",t:"Try using platforms like Kaggle, or prompt an AI to give you more ideas. Remember, the purpose of this exercise is to be exploring what AI can actually do."},
     {b:"Clean before you analyze:",t:"Ask the AI to propose cleaning steps before diving into metrics."},
     {b:"The memo is the deliverable:",t:"No charts required (although seeing what analyses the AI performs is never a bad thing ;)). Clear thinking on one page, and a demonstration of knowing how to use AI to enhance this work, is what matters."},

   ],

     {b:"Connect",t:"to a live data source for real-time analysis."},

   tasks:[
     {b:"Get your data",t:"— MyAiPathways-provided, or from Spotify, Google Takeout, or Kaggle, for example."},
     {b:"Upload and interrogate",t:"— ask for cleaning steps, 5–10 metrics, and 3 hypotheses."},
     {b:"Produce",t:"cleaned dataset, summary table, 3 insights, 3 actions."},

let S=(()=>{try{return JSON.parse(localStorage.getItem('aip_v6')||'null')||{t:{},sc:{},r:{}};}catch{return{t:{},sc:{},r:{}}}})();
const save=()=>localStorage.setItem('aip_v6',JSON.stringify(S));
const tk=(p,i)=>`${p}_${i}`,sk=(p,f)=>`${p}_${f}`,rk=(p,i)=>`${p}_r${i}`;
function toggleTask(pid,idx){S.t[tk(pid,idx)]=!S.t[tk(pid,idx)];save();rerenderPart(pid);updateGlobal();}
function saveScore(pid,f,v){S.sc[sk(pid,f)]=v;save();}
function saveReflect(pid,i,v){S.r[rk(pid,i)]=v;save();}
function pDone(part){return part.tasks.filter((_,i)=>S.t[tk(part.id,i)]).length;}
function isDone(part){return pDone(part)===part.tasks.length;}

function buildNav(){
  document.getElementById('navList').innerHTML=PARTS.slice(0,4).map((p,i)=>
    `<button class="nav-item ${i===0?'active':''} ${isDone(p)?'done':''}" id="nav-${p.id}" onclick="showPart(${p.id})">
      <span class="nav-num">${p.num}</span>
      <span class="nav-name">${p.title}</span>
      <span class="nav-chk">${isDone(p)?'✓':''}</span>
    </button>`
  ).join('');
}

function rerenderPart(pid){
  const p=PARTS[pid],done=pDone(p),total=p.tasks.length,complete=isDone(p);
  const nav=document.getElementById(`nav-${pid}`);
  if(nav){nav.classList.toggle('done',complete);nav.querySelector('.nav-chk').textContent=complete?'✓':'';}

  document.getElementById(`panel-${pid}`).innerHTML=`
    <div class="hero">
      <div class="part-number">${p.num}</div>
      <div class="hero-eyebrow">Part ${p.num} &nbsp;·&nbsp; ${p.duration}</div>
      <h1>${p.title}</h1>
      <div class="hero-tagline">${p.tagline}</div>
      <div class="hero-divider"></div>
    </div>

    ${pid===0?`<p style="font-size:13px;color:var(--ink2);margin-bottom:16px;">Access the project guidelines <a href="https://aidbnewyear.com/program" target="_blank" rel="noopener noreferrer" style="color:var(--accent);">here</a>. This assignment corresponds to <strong>Week 1: Resolution Tracker</strong>. You can also access the guidelines on the <strong>Mission Dossier</strong>.</p>`:''}
    ${pid===1?`<p style="font-size:13px;color:var(--ink2);margin-bottom:16px;">Access the project guidelines <a href="https://aidbnewyear.com/program" target="_blank" rel="noopener noreferrer" style="color:var(--accent);">here</a>. This assignment corresponds to <strong>Week 2: Model Mapping</strong>. You can also access the guidelines on the <strong>Mission Dossier</strong>.</p>`:''}
    ${pid===2?`<p style="font-size:13px;color:var(--ink2);margin-bottom:16px;">Access the project guidelines <a href="https://aidbnewyear.com/program" target="_blank" rel="noopener noreferrer" style="color:var(--accent);">here</a>. This assignment corresponds to <strong>Week 4: Data Analyst</strong>. You can also access the guidelines on the <strong>Mission Dossier</strong>.</p>`:''}
    ${pid===3?`<p style="font-size:13px;color:var(--ink2);margin-bottom:16px;">Access the project guidelines <a href="https://aidbnewyear.com/program" target="_blank" rel="noopener noreferrer" style="color:var(--accent);">here</a>. This assignment corresponds to <strong>Week 5: Visual Reasoning</strong>. You can also access the guidelines on the <strong>Mission Dossier</strong>.</p>`:''}
    ${pid===4?`<p style="font-size:13px;color:var(--ink2);margin-bottom:16px;">Access the project guidelines <a href="https://aidbnewyear.com/program" target="_blank" rel="noopener noreferrer" style="color:var(--accent);">here</a>. This assignment corresponds to <strong>Week 6: Information Pipelines</strong>. You can also access the guidelines on the <strong>Mission Dossier</strong>.</p>`:''}
    <div class="meta-strip">
      <div class="meta-cell">
        <div class="meta-key">Deliverable</div>
        <div class="meta-val">${p.deliverable}</div>
      </div>
      <div class="meta-cell">
        <div class="meta-key">Tools</div>
        <div class="meta-val">${p.tools}</div>
      </div>
      <div class="meta-cell">
        <div class="meta-key">Success criteria</div>
        <div class="meta-val">${p.doneWhen}</div>
      </div>
      <div class="meta-cell">
        <div class="meta-key">Progress</div>
        <div class="meta-val">
          <span class="chip ${complete?'chip-done':'chip-prog'}">${complete?'Complete':done+' / '+total+' tasks'}</span>
        </div>
      </div>
    </div>

    <div class="briefing">
      <div class="brief-why">${p.why}</div>
      <div class="brief-cols">
        <div>
          <div class="brief-col-title">Tips</div>
          <div class="tip-list">
            ${p.tips.map((t,i)=>`<div class="tip-item"><span class="tip-n">·</span><span><strong>${t.b}</strong> ${t.t}</span></div>`).join('')}
          </div>
        </div>
        <div>
          <div class="brief-col-title">If you want to go further</div>
          <div class="adv-list">
            ${p.advanced.map((a,i)=>`<div class="adv-item"><span class="adv-n">·</span><span><strong>${a.b}</strong> ${a.t}</span></div>`).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="sec-lbl">Tasks</div>
    <div class="task-list">
      ${p.tasks.map((t,i)=>{const d=!!S.t[tk(pid,i)];return`
      <div class="task-item ${d?'done':''}" onclick="toggleTask(${pid},${i})">
        <div class="task-cb">${d?'✓':''}</div>
        <div class="task-text"><strong>${t.b}</strong> ${t.t}</div>
      </div>`;}).join('')}
    </div>

    <div class="sec-lbl">Reflect</div>
    <p style="margin:0 0 16px;font-size:14px;">Please answer the reflection questions using <a href="${p.form}" target="_blank" rel="noopener noreferrer">this Google Form</a>.</p>
    <div class="reflect-list">
      ${p.reflects.map((r,i)=>`
      <div class="reflect-item">
        <div class="reflect-q">${r}</div>
        <textarea class="reflect-in" placeholder="Your response..." oninput="saveReflect(${pid},${i},this.value)">${S.r[rk(pid,i)]||''}</textarea>
      </div>`).join('')}
    </div>

    <div class="sec-lbl">Scorecard</div>
    <div class="scorecard">
      <div class="score-grid">
        <div class="score-cell">
          <div class="score-key">Outcome quality</div>
          <div class="score-sub">Rate 1–5</div>
          <input class="score-in" type="number" min="1" max="5" placeholder="—" value="${S.sc[sk(pid,'q')]||''}" oninput="saveScore(${pid},'q',this.value)">
        </div>
        <div class="score-cell">
          <div class="score-key">Time saved</div>
          <div class="score-sub">Rate 1–5</div>
          <input class="score-in" type="number" min="1" max="5" placeholder="—" value="${S.sc[sk(pid,'t')]||''}" oninput="saveScore(${pid},'t',this.value)">
        </div>
        <div class="score-cell">
          <div class="score-key">Repeatable?</div>
          <div class="score-sub">Yes / No / Maybe</div>
          <input class="score-in" type="text" placeholder="—" value="${S.sc[sk(pid,'r')]||''}" oninput="saveScore(${pid},'r',this.value)">
        </div>
        <div class="score-cell">
          <div class="score-key">Use again?</div>
          <div class="score-sub">Yes / No</div>
          <input class="score-in" type="text" placeholder="—" value="${S.sc[sk(pid,'u')]||''}" oninput="saveScore(${pid},'u',this.value)">
        </div>
      </div>
      <textarea class="score-notes" placeholder="Notes: best prompt, what worked, what didn't..." oninput="saveScore(${pid},'n',this.value)">${S.sc[sk(pid,'n')]||''}</textarea>
    </div>

    <div class="complete-banner ${complete?'show':''}" id="banner-${pid}">
      <div>
        <div class="cb-h">Part ${p.num} complete</div>
        <div class="cb-p">${pid<9?'Up next — '+PARTS[pid+1].title:'All 10 parts done.'}</div>
      </div>
      ${pid<9?`<button class="next-btn" onclick="showPart(${pid+1})">Next part →</button>`:''}
    </div>
  `;
}

function buildContent(){
  document.getElementById('mainContent').innerHTML=PARTS.map((p,i)=>`<div class="part-panel ${i===0?'active':''}" id="panel-${p.id}"></div>`).join('');
  PARTS.forEach(p=>rerenderPart(p.id));
}

function showPart(idx){
  document.querySelectorAll('.part-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  document.querySelectorAll('.nav-item').forEach((n,i)=>n.classList.toggle('active',i===idx));
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateGlobal(){
  let td=0,tt=0;
  PARTS.forEach(p=>{td+=pDone(p);tt+=p.tasks.length;});
  const pct=tt?Math.round(td/tt*100):0;
  document.getElementById('spFill').style.width=pct+'%';
  document.getElementById('spVal').textContent=pct+'%';
}

buildNav();buildContent();updateGlobal();

</script>
</body>
</html>
